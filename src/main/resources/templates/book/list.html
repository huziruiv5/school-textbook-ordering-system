<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head><title>教材管理 - 学校教材订购系统</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="page-title mb-0"><i class="bi bi-journal-text"></i> 教材信息管理</h4>
        <div th:if="${user.role == 'DISTRIBUTOR' || user.role == 'PURCHASER'}">
            <a th:href="@{/books/add}" class="btn btn-warning">
                <i class="bi bi-plus-circle"></i> 添加教材
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ISBN</th>
                            <th>教材名称</th>
                            <th>作者</th>
                            <th>出版社</th>
                            <th>定价</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}">
                            <td><code th:text="${book.isbn}">ISBN</code></td>
                            <td th:text="${book.name}">教材名称</td>
                            <td th:text="${book.author != null ? book.author : '-'}">作者</td>
                            <td th:text="${book.publisher != null ? book.publisher : '-'}">出版社</td>
                            <td class="text-danger fw-bold" th:text="${book.price != null ? #numbers.formatDecimal(book.price, 1, 2) : '-'}">¥0.00</td>
                            <td>
                                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i> 编辑
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(books)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                暂无教材信息
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
