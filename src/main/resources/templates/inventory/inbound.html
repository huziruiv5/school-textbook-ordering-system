<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head><title>入库记录 - 学校教材订购系统</title></head>
<body>
<div layout:fragment="content">
    <div class="mb-3">
        <a th:href="@{/inventory}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回库存
        </a>
    </div>
    <h4 class="page-title"><i class="bi bi-box-arrow-in-down"></i> 入库记录</h4>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>编号</th>
                            <th>教材</th>
                            <th>入库数量</th>
                            <th>来源</th>
                            <th>入库日期</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${records}">
                            <td th:text="${r.record.id}">1</td>
                            <td th:text="${r.book != null ? r.book.name : r.record.bookId}">教材</td>
                            <td class="text-success fw-bold" th:text="'+' + ${r.record.quantity}">+10</td>
                            <td>
                                <span th:if="${r.record.source == 'PURCHASE'}" class="badge bg-info">采购入库</span>
                                <span th:if="${r.record.source == 'RETURN'}" class="badge bg-secondary">退回入库</span>
                            </td>
                            <td th:text="${#temporals.format(r.record.inboundDate, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                            <td th:text="${r.record.remark != null ? r.record.remark : '-'}" class="text-muted">备注</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(records)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                暂无入库记录
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
