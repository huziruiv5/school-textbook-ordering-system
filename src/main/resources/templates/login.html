<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 学校教材订购系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.2);
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .icon {
            font-size: 3rem;
            color: #667eea;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-top: 1rem;
        }
        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .test-accounts {
            margin-top: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }
        .test-accounts h6 {
            color: #666;
            margin-bottom: 0.5rem;
        }
        .test-accounts table {
            width: 100%;
        }
        .test-accounts td {
            padding: 0.15rem 0.5rem;
        }
        .test-accounts .badge {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-book icon"></i>
            <h1>学校教材订购系统</h1>
            <p>Software Engineering Course Project</p>
        </div>

        <!-- 错误提示 -->
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}">错误信息</span>
        </div>

        <!-- 登录表单 -->
        <form action="/login" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required autofocus
                           placeholder="请输入用户名">
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="请输入密码">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> 登 录
            </button>
        </form>

        <!-- 测试账号 -->
        <div class="test-accounts">
            <h6><i class="bi bi-info-circle"></i> 测试账号（密码均为 123456）</h6>
            <table>
                <tr><td>teacher1</td><td><span class="badge bg-info">教师</span></td></tr>
                <tr><td>student1</td><td><span class="badge bg-success">学生</span></td></tr>
                <tr><td>distributor1</td><td><span class="badge bg-warning text-dark">教材发行人员</span></td></tr>
                <tr><td>purchaser1</td><td><span class="badge bg-danger">采购人员</span></td></tr>
            </table>
        </div>
    </div>
</body>
</html>
