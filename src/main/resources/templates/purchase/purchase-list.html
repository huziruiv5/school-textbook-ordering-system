<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head><title>采购单列表 - 学校教材订购系统</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="page-title mb-0"><i class="bi bi-truck"></i> 采购单管理</h4>
        <div th:if="${user.role == 'PURCHASER'}">
            <a th:href="@{/purchase/purchases/create}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> 创建采购单
            </a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>编号</th>
                            <th>教材ID</th>
                            <th>采购数量</th>
                            <th>采购日期</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="purchase : ${purchases}">
                            <td th:text="${purchase.id}">1</td>
                            <td th:text="${purchase.bookId}">教材ID</td>
                            <td th:text="${purchase.quantity}">10</td>
                            <td th:text="${#temporals.format(purchase.purchaseDate, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                            <td>
                                <span th:if="${purchase.status == 'PENDING'}" class="badge bg-warning text-dark">待订购</span>
                                <span th:if="${purchase.status == 'ORDERED'}" class="badge bg-info">已订购</span>
                                <span th:if="${purchase.status == 'RECEIVED'}" class="badge bg-success">已到货</span>
                            </td>
                            <td>
                                <span th:if="${purchase.status == 'PENDING' && user.role == 'PURCHASER'}">
                                    <form th:action="@{/purchase/purchases/{id}/receive(id=${purchase.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-success">
                                            <i class="bi bi-box-arrow-in-down"></i> 到货入库
                                        </button>
                                    </form>
                                </span>
                                <span th:if="${purchase.status == 'RECEIVED'}" class="text-muted small">
                                    <i class="bi bi-check-circle"></i> 已完成
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(purchases)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                暂无采购单
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
