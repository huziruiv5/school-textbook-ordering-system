<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head><title>审核购书单 - 学校教材订购系统</title></head>
<body>
<div layout:fragment="content">
    <div class="mb-3">
        <a th:href="@{/sales/orders}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card mb-3">
                <div class="card-header">购书单信息</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-sm-4">
                            <small class="text-muted d-block">购书单号</small>
                            <strong><code th:text="${order.orderNo}">ORD-001</code></strong>
                        </div>
                        <div class="col-sm-4">
                            <small class="text-muted d-block">提交人</small>
                            <strong th:text="${submitter != null ? submitter.realName : ''}">教师/学生</strong>
                        </div>
                        <div class="col-sm-4">
                            <small class="text-muted d-block">提交日期</small>
                            <strong th:text="${#temporals.format(order.submitDate, 'yyyy-MM-dd HH:mm')}">2024-01-01</strong>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-sm-4">
                            <small class="text-muted d-block">总金额</small>
                            <strong class="text-danger" th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 1, 2) : '-'}">¥0.00</strong>
                        </div>
                        <div class="col-sm-4">
                            <small class="text-muted d-block">当前状态</small>
                            <span class="badge bg-warning text-dark">待审核</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 明细 -->
            <div class="card mb-3">
                <div class="card-header">购书明细</div>
                <div class="card-body p-0">
                    <table class="table table-striped mb-0">
                        <thead>
                            <tr>
                                <th>教材ID</th>
                                <th>单价</th>
                                <th>数量</th>
                                <th>小计</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${items}">
                                <td th:text="${item.bookId}">教材名称</td>
                                <td th:text="${item.price != null ? #numbers.formatDecimal(item.price, 1, 2) : '-'}">¥0.00</td>
                                <td th:text="${item.quantity}">1</td>
                                <td th:text="${item.subtotal != null ? #numbers.formatDecimal(item.subtotal, 1, 2) : '-'}">¥0.00</td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light">
                            <tr>
                                <th colspan="3" class="text-end">合计：</th>
                                <th class="text-danger" th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 1, 2) : '-'}">¥0.00</th>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header">审核操作</div>
                <div class="card-body">
                    <form th:action="@{/sales/orders/{id}/approve(id=${order.id})}" method="post">
                        <div class="d-grid gap-2">
                            <button type="submit" name="approved" value="true" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle"></i> 通过审核
                            </button>
                            <button type="submit" name="approved" value="false" class="btn btn-danger btn-lg">
                                <i class="bi bi-x-circle"></i> 驳回
                            </button>
                        </div>
                        <div class="mt-3">
                            <label class="form-label">审核意见</label>
                            <textarea name="remark" class="form-control" rows="3"
                                      placeholder="输入审核意见（可选）"></textarea>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
